<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MySite</title>

    {% load static %}

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-light bg-light px-3 shadow-sm">
    <span class="navbar-brand mb-0 h5">MySite</span>
    <div>
        <a href="#" class="me-3 text-decoration-none">Features</a>
        <a href="#" class="text-decoration-none">Contact</a>
    </div>
</nav>

<!-- Main Content -->
<main class="container-fluid">
    {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="text-center text-muted mt-4 mb-3">
    © MySite
</footer>

<!-- ✅ JavaScript (VERY IMPORTANT) -->
<script src="{% static 'js/main.js' %}"></script>

</body>
</html>
